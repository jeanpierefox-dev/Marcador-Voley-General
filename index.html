<style>
  /* Scrollbar personalizado corporativo */

  /* Construction Animations */
  @keyframes slideInLeft {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  @keyframes slideInRight {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  @keyframes scaleY {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
  @keyframes emphasisIn {
    0% { transform: translateX(-100vw) skewX(-20deg) scale(0.5); opacity: 0; }

    100% { transform: translateX(0) skewX(0deg) scale(1); opacity: 1; }
  }
  @keyframes emphasisOut {
    0% { transform: translateX(0) skewX(0deg) scale(1); opacity: 1; }

    100% { transform: translateX(100vw) skewX(20deg) scale(0.5); opacity: 0; }
  }
  @keyframes drawBoardIn {
    0% { clip-path: inset(50% 50% 50% 50%); opacity: 0; transform: scale(0.95); }
    40% { clip-path: inset(50% 0% 50% 0%); opacity: 1; transform: scale(1); }
    100% { clip-path: inset(0% 0% 0% 0%); opacity: 1; transform: scale(1); }
  }
  @keyframes drawBoardOut {

    60% { clip-path: inset(50% 0% 50% 0%); opacity: 1; transform: scale(1); }
    100% { clip-path: inset(50% 50% 50% 50%); opacity: 0; transform: scale(0.95); }
  }
